# NETLIFY: netlify.toml is active alongside public/_redirects.
# VERCEL: Use vercel.json instead.
# APACHE: Use public/.htaccess instead.
# NGINX: Add `try_files $uri $uri/ /index.html;` to your server block.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = ".env.example,.gitignore"
  SECRETS_SCAN_OMIT_KEYS = "APP_ENV,VITE_CONTACT_EMAIL,API_KEY"
# SPA fallback (redundant with _redirects but good to have both)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Caching headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
